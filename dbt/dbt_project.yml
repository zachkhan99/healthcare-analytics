name: healthcare_analytics
version: '1.0.0'
config-version: 2

profile: healthcare

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  healthcare_analytics:
    staging:
      +schema: staging
      +materialized: view
    marts:
      +schema: marts
      +materialized: table
    analytics:
      +schema: marts
      +materialized: table

vars:
  # Lookback window for 30-day readmission analysis
  readmission_days: 30
